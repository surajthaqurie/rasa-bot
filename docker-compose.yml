version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: rasa-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      PYTHONPATH: .
      PYTHONWARNINGS: "ignore"
      SQLALCHEMY_SILENCE_UBER_WARNING: 1
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    env_file:
      - .env
    volumes:
      - mongo_data:/data/db
      - ./scripts/init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  rasa:
    build: .
    container_name: rasa_bot
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "5005:5005"
    # Individual volumes for persistence only - No blanket host-to-container mount
    volumes:
      - ./models:/app/models
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:5005/webhooks/conversation/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G

volumes:
  mongo_data:
